<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tap Coin + Lucky Chest</title>
<style>
body{
  background:#1b1b2f;
  color:white;
  font-family:Arial;
  text-align:center;
  margin-top:20px;
}

#coins{
  font-size:35px;
  margin:20px;
}

input{
  margin:5px;
  padding:5px;
  border-radius:5px;
  border:none;
}

button{
  padding:5px 10px;
  border-radius:5px;
  border:none;
  cursor:pointer;
  background:#f0a500;
  color:black;
  font-weight:bold;
  margin:5px;
}

.coin, .chest, .gold-chest{
  width:180px;
  cursor:pointer;
  transition:0.2s;
  margin-top:20px;
  display:block;
}

/* Анимация прыжка монеты */
@keyframes jump {
  0%   { transform: translateY(0) scale(1); }
  50%  { transform: translateY(-30px) scale(1.3); }
  100% { transform: translateY(0) scale(1); }
}
.coin.jump { animation: jump 0.3s ease; }

/* Анимация сундука */
@keyframes chestJump {
  0% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-20px) scale(1.1); }
  100% { transform: translateY(0) scale(1); }
}
.chest.jump, .gold-chest.jump { animation: chestJump 0.5s ease; }
</style>
</head>

<body>

<h1>🪙 Tap Coin + Lucky Chest</h1>

<!-- Поля регистрации и входа -->
<input id="login" placeholder="Логин">
<input id="password" placeholder="Пароль" type="password">
<button id="registerBtn">Зарегистрироваться</button>
<button id="loginBtn">Войти</button>

<div id="coins">0</div>

<img class="coin" src="https://cdn-icons-png.flaticon.com/512/138/138292.png">

<!-- Обычный сундук -->
<img id="chest" class="chest" src="https://cdn-icons-png.flaticon.com/512/833/833314.png" style="display:none;">

<!-- Золотой редкий сундук -->
<img id="goldChest" class="gold-chest" src="https://cdn-icons-png.flaticon.com/512/833/833310.png" style="display:none;">

<script>
const serverUrl = "https://bot-game-1-686w.onrender.com"; // URL вашего сервера
let login = '';
const coin = document.querySelector('.coin');
const display = document.getElementById('coins');
const chest = document.getElementById('chest');
const goldChest = document.getElementById('goldChest');

// Регистрация
document.getElementById('registerBtn').onclick = async () => {
  login = document.getElementById('login').value;
  const password = document.getElementById('password').value;
  if(!login || !password) return alert("Введите логин и пароль");
  const res = await fetch(`${serverUrl}/register`, {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({login, password})
  });
  const data = await res.json();
  if(data.error) alert(data.error);
  else {
    alert("Аккаунт создан!");
    display.innerText = data.coins;
  }
};

// Вход
document.getElementById('loginBtn').onclick = async () => {
  login = document.getElementById('login').value;
  const password = document.getElementById('password').value;
  if(!login || !password) return alert("Введите логин и пароль");
  const res = await fetch(`${serverUrl}/login`, {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({login, password})
  });
  const data = await res.json();
  if(data.error) alert(data.error);
  else {
    alert("Вход выполнен!");
    display.innerText = data.coins;
  }
};

// Добавление монет
async function addCoins(amount){
  if(!login) return alert("Сначала войдите!");
  const res = await fetch(`${serverUrl}/add`, {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({login, amount})
  });
  const data = await res.json();
  display.innerText = data.coins;
}

// Появление сундуков
function maybeShowChest(){
  if(Math.random() < 0.05 && chest.style.display==='none'){
    chest.style.display='block';
    chest.classList.add("jump");
    setTimeout(()=>chest.classList.remove("jump"),500);
  }
  if(Math.random() < 0.01 && goldChest.style.display==='none'){
    goldChest.style.display='block';
    goldChest.classList.add("jump");
    setTimeout(()=>goldChest.classList.remove("jump"),500);
  }
}

// Клик по монете
coin.onclick = async () => {
  await addCoins(1);
  coin.classList.add("jump");
  setTimeout(()=> coin.classList.remove("jump"), 300);
  maybeShowChest();
}

// Клик по обычному сундуку
chest.onclick = async () => {
  const bonus = Math.floor(Math.random()*231) + 20; // 20-250 монет
  await addCoins(bonus);
  alert(`🎉 Поздравляем! Вы получили ${bonus} монет!`);
  chest.style.display='none';
}

// Клик по золотому сундуку
goldChest.onclick = async () => {
  const bonus = Math.floor(Math.random()*501) + 500; // 500-1000 монет
  await addCoins(bonus);
  alert(`🌟 Вау! Вы нашли ЗОЛОТОЙ сундук и получили ${bonus} монет!`);
  goldChest.style.display='none';
}
</script>

</body>
</html>
